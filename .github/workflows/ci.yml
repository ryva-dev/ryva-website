name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ryva_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ryva_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Server tests
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/ryva_test
          PGSSL: disable
        run: |
          DATABASE_URL="$TEST_DATABASE_URL" npm run migrate
          npm test

      - name: Type check and build
        run: npm run build
